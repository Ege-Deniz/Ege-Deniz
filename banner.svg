<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="82%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="15%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <rect width="1200" height="300" fill="url(#glowBlue)"/>
  <rect width="1200" height="300" fill="url(#glowCyan)"/>

  <g font-family="-apple-system, 'Helvetica Neue', Inter, sans-serif">
    <text x="80" y="165" font-size="96" font-weight="200" fill="#ffffff" letter-spacing="-3">ege deniz</text>
    <line x1="82" y1="195" x2="162" y2="195" stroke="#3b82f6" stroke-width="2"/>
    <text x="172" y="201" font-size="14" font-weight="500" fill="#8b949e" letter-spacing="3">DESIGNING AND CODING THE SPATIAL WEB</text>
  </g>

  <g opacity="0.55">
    <circle cx="1020" cy="150" r="1.5" fill="#ffffff"/>
    <circle cx="1060" cy="90" r="1" fill="#ffffff"/>
    <circle cx="1100" cy="180" r="1.2" fill="#ffffff"/>
    <circle cx="980" cy="220" r="0.8" fill="#ffffff"/>
    <circle cx="1140" cy="120" r="1" fill="#ffffff"/>
    <circle cx="940" cy="70" r="0.9" fill="#ffffff"/>
    <circle cx="1080" cy="240" r="1.3" fill="#ffffff"/>
  </g>
</svg>
