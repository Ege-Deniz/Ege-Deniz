<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 400" width="1500" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="82%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="15%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1500" height="400" fill="url(#bg)"/>
  <rect width="1500" height="400" fill="url(#grid)"/>
  <rect width="1500" height="400" fill="url(#glowBlue)"/>
  <rect width="1500" height="400" fill="url(#glowCyan)"/>

  <g font-family="-apple-system, 'Helvetica Neue', Inter, sans-serif">
    <text x="100" y="215" font-size="120" font-weight="200" fill="#ffffff" letter-spacing="-4">ege deniz</text>
    <line x1="103" y1="250" x2="203" y2="250" stroke="#3b82f6" stroke-width="2"/>
    <text x="215" y="257" font-size="15" font-weight="500" fill="#8b949e" letter-spacing="4">FULL-STACK  ·  AI  ·  SPATIAL WEB</text>
  </g>
</svg>
